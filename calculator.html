<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUNA Calculator</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a href="index.html" class="btn btn-outline-light btn-sm" style="position:absolute; top:10px; left:10px; z-index:100;">← Home</a>
  <button class="btn btn-outline-secondary theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()"
    title="Toggle dark/light mode">🌙</button>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-6 col-sm-8">
        <div class="border border-dotted border-3 rounded-3 p-3 mb-4 bg-white bg-opacity-50">
          <h4 class="text-center group-header mb-0">VUNA CALCULATOR</h4>
          <p class="text-center text-small text-muted">
            <i>Created by set 2025/26 Software Engineering</i>
          </p>
        </div>
        <div class="row">
          <div class="col-md-12">
            <div class="card calculator-card">
              <div class="card-body p-4">
                <div class="calculator">
                  <div class="display-container">
                    <input type="text" class="form-control" id="result" placeholder="0" disabled />
                  </div>
                  <div class="polynomial-panel mb-3">
                    <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
                      <button class="btn btn-outline-primary btn-sm" onclick="setPolynomialDegree(2)">Quadratic</button>
                      <button class="btn btn-outline-primary btn-sm" onclick="setPolynomialDegree(3)">Cubic</button>
                      <button class="btn btn-outline-primary btn-sm" onclick="setPolynomialDegree(4)">Quartic</button>
                      <button class="btn btn-secondary btn-sm" onclick="clearPolynomialInputs()">Reset</button>
                    </div>
                    <div class="row gx-2 mb-2" id="polynomial-inputs">
                      <div class="col">
                        <input type="number" class="form-control form-control-sm" id="coeff-a" placeholder="a" step="any" />
                      </div>
                      <div class="col">
                        <input type="number" class="form-control form-control-sm" id="coeff-b" placeholder="b" step="any" />
                      </div>
                      <div class="col">
                        <input type="number" class="form-control form-control-sm" id="coeff-c" placeholder="c" step="any" />
                      </div>
                      <div class="col" id="coeff-d-col" style="display:none;">
                        <input type="number" class="form-control form-control-sm" id="coeff-d" placeholder="d" step="any" />
                      </div>
                      <div class="col" id="coeff-e-col" style="display:none;">
                        <input type="number" class="form-control form-control-sm" id="coeff-e" placeholder="e" step="any" />
                      </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center gap-2">
                      <button class="btn btn-success btn-sm" onclick="solvePolynomial()">Solve</button>
                      <small id="poly-mode-label" class="text-muted">Quadratic solver</small>
                    </div>
                  </div>
                  <div class="btn-grid">
                    <!-- Row 1: AC, CE, ÷ -->
                    <button class="btn btn-action" onclick="clearResult()">AC</button>
                    <button class="btn btn-action" onclick="backspace()">CE</button>
                    <button class="btn btn-light" style="visibility:hidden;" disabled></button>
                    <button class="btn btn-operator" onclick="operatorToResult('/')">÷</button>

                    <!-- Row 2: 7, 8, 9, × -->
                    <button class="btn btn-light" onclick="appendToResult(7)">7</button>
                    <button class="btn btn-light" onclick="appendToResult(8)">8</button>
                    <button class="btn btn-light" onclick="appendToResult(9)">9</button>
                    <button class="btn btn-operator" onclick="operatorToResult('*')">×</button>

                    <!-- Row 3: 4, 5, 6, − -->
                    <button class="btn btn-light" onclick="appendToResult(4)">4</button>
                    <button class="btn btn-light" onclick="appendToResult(5)">5</button>
                    <button class="btn btn-light" onclick="appendToResult(6)">6</button>
                    <button class="btn btn-operator" onclick="operatorToResult('-')">−</button>

                    <!-- Row 4: 1, 2, 3, + -->
                    <button class="btn btn-light" onclick="appendToResult(1)">1</button>
                    <button class="btn btn-light" onclick="appendToResult(2)">2</button>
                    <button class="btn btn-light" onclick="appendToResult(3)">3</button>
                    <button class="btn btn-operator" onclick="operatorToResult('+')">+</button>

                    <!-- Row 5: ., 0, = (span 2) -->
                    <button class="btn btn-light" onclick="appendToResult('.')">.</button>
                    <button class="btn btn-light" onclick="appendToResult(0)">0</button>
                    <button class="btn btn-equals" onclick="calculateResult()" style="grid-column: span 2;">=</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <script src="src/calculator.js"></script>
          <script src="assets/js/bootstrap.min.js"></script>
          <script src="assets/js/script.js"></script>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
